{{- if .Values.backup.enabled }}
apiVersion: batch/v1
kind: CronJob
metadata:
  name: {{ .Chart.Name }}-backup
  labels:
    app: {{ .Chart.Name }}
    component: backup
spec:
  schedule: {{ .Values.backup.schedule | quote }}
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      template:
        spec:
          restartPolicy: OnFailure
          containers:
            - name: mongodump
              image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
              command:
                - /bin/bash
                - -c
                - |
                  set -e
                  TIMESTAMP=$(date +%Y%m%d-%H%M%S)
                  BACKUP_DIR="/backup/recipedb-${TIMESTAMP}"
                  echo "Starting MongoDB backup: ${TIMESTAMP}"
                  mongodump --host={{ .Chart.Name }}:{{ .Values.service.port }} \
                            --db=recipedb \
                            --out="${BACKUP_DIR}"
                  echo "Backup completed: ${BACKUP_DIR}"
                  # Compress
                  cd /backup && tar czf "recipedb-${TIMESTAMP}.tar.gz" "recipedb-${TIMESTAMP}"
                  rm -rf "${BACKUP_DIR}"
                  echo "Compressed backup ready: recipedb-${TIMESTAMP}.tar.gz"
                  # Cleanup old backups (keep last N days)
                  find /backup -name "*.tar.gz" -mtime +{{ .Values.backup.retentionDays }} -delete
                  echo "Cleanup complete"
              volumeMounts:
                - name: backup-volume
                  mountPath: /backup
          volumes:
            - name: backup-volume
              emptyDir: {}
{{- end }}
